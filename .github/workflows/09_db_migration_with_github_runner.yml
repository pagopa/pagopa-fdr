
name: DB migration

on:
  workflow_call:
    inputs:
      environment:
        required: true
        description: The name of the environment target of the DB migration
        type: string
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        description: Select the Environment
        options:
          - dev
          - uat
          - prod
      user:
        required: true
        type: choice
        description: Select the user
        options:
          - fdr3
          - azureuser
        default: "fdr3"
      db_type:
        required: true
        type: choice
        description: Select the DB type
        options:
          - online
          - archive
      db_version:
        required: true
        description: Db version (👀 src/main/resources/db/migration/liquibase )
        type: string
        default: "1.1.0"
        
permissions:
  id-token: write
  contents: read

jobs:
  create_runner:
    name: Create Runner
    runs-on: [ self-hosted-job, "${{ inputs.environment }}" ]
    environment:
      name: ${{ inputs.environment }}
    outputs:
      runner_name: ${{ steps.create_github_runner.outputs.runner_name }}
    steps:
      - name: Create GitHub Runner
        id: create_github_runner
        # from https://github.com/pagopa/eng-github-actions-iac-template/tree/main/azure/github-self-hosted-runner-azure-create-action
        uses: pagopa/eng-github-actions-iac-template/azure/github-self-hosted-runner-azure-create-action@main
        with:
          client_id: ${{ secrets.CD_CLIENT_ID }}
          tenant_id: ${{ secrets.TENANT_ID }}
          subscription_id: ${{ secrets.SUBSCRIPTION_ID }}
          container_app_environment_name: ${{ vars.CONTAINER_APP_ENVIRONMENT_NAME }}
          resource_group_name: ${{ vars.CONTAINER_APP_ENVIRONMENT_RESOURCE_GROUP_NAME }} # RG of the runner
          pat_token: ${{ secrets.BOT_TOKEN_GITHUB }}
          self_hosted_runner_image_tag: "latest"

  db_migration:
    needs: [ create_runner ]
    runs-on: [ self-hosted, "${{ needs.create_runner.outputs.runner_name }}" ]
    name: DB migration
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Install Liquibase
        shell: bash
        run: |
          cd ./
          mkdir liquibase-app
          wget -c https://github.com/liquibase/liquibase/releases/download/v4.17.1/liquibase-4.17.1.tar.gz
          tar -xzf liquibase-4.17.1.tar.gz -C liquibase-app
          rm -rf liquibase-4.17.1.tar.gz
          ls -la liquibase-app

      - name: Run liquibase::migrate
        shell: bash
        run: |
          export PATH="$PATH:./liquibase-app"
          CLASSPATH="./src/main/resources/db/migration/liquibase/${{ inputs.db_type }}/${{ inputs.user }}.changelog"
          PROPS_FILE="liquibase.properties"
          if [[ "${{ inputs.db_type }}" == "online" ]]; then
            URL="jdbc:postgresql://${{ vars.POSTGRES_DB_HOST }}:${{ vars.POSTGRES_DB_PORT }}/${{ vars.POSTGRES_DB_NAME }}?prepareThreshold=0&currentSchema=${{ vars.POSTGRES_DB_SCHEMA }}"
          elif [[ "${{ inputs.db_type }}" == "archive" ]]; then
            URL="jdbc:postgresql://${{ vars.POSTGRES_ARCHIVE_DB_HOST }}:${{ vars.POSTGRES_ARCHIVE_DB_PORT }}/${{ vars.POSTGRES_DB_NAME }}?prepareThreshold=0&currentSchema=${{ vars.POSTGRES_DB_SCHEMA }}"
          fi
          if [[ "${{ inputs.user }}" == "azureuser" ]]; then
            USERNAME="${{ vars.POSTGRES_DB_ADMIN_USERNAME }}"
            PASSWORD="${{ secrets.POSTGRES_DB_ADMIN_PASSWORD }}"
            DEFAULT_SCHEMA="public"
            LIQUIBASE_SCHEMA="public"
          elif [[ "${{ inputs.user }}" == "fdr3" ]]; then
            USERNAME="${{ vars.POSTGRES_DB_USERNAME }}"
            PASSWORD="${{ secrets.POSTGRES_DB_PASSWORD }}"
            DEFAULT_SCHEMA="${{ vars.POSTGRES_DB_SCHEMA }}"
            LIQUIBASE_SCHEMA="${{ vars.POSTGRES_DB_SCHEMA }}"
          fi
          cat <<EOF > $PROPS_FILE
            classpath: $CLASSPATH
            liquibase.headless: true
            url: $URL
            contexts: ${{ inputs.environment }}
            username: $USERNAME
            password: $PASSWORD
            defaultSchemaName: $DEFAULT_SCHEMA
            liquibaseSchemaName: $LIQUIBASE_SCHEMA
            liquibase.hub.mode: OFF
            log-level: INFO
          EOF
          liquibase --defaultsFile=$PROPS_FILE update --changelogFile="db.changelog-master-${{ inputs.db_version }}.xml"
          rm $PROPS_FILE

  cleanup_runner:
    name: Cleanup Runner
    needs: [ create_runner, db_migration ]
    if: ${{ success() || failure() }}
    runs-on: ubuntu-22.04
    environment: ${{ inputs.environment }}
    steps:
      - name: Cleanup GitHub Runner
        id: cleanup_github_runner
        # from https://github.com/pagopa/eng-github-actions-iac-template/tree/main/azure/github-self-hosted-runner-azure-cleanup-action
        uses: pagopa/eng-github-actions-iac-template/azure/github-self-hosted-runner-azure-cleanup-action@0ee2f58fd46d10ac7f00bce4304b98db3dbdbe9a
        with:
          client_id: ${{ secrets.CD_CLIENT_ID }}
          tenant_id: ${{ secrets.TENANT_ID }}
          subscription_id: ${{ secrets.SUBSCRIPTION_ID }}
          resource_group_name: ${{ vars.CONTAINER_APP_ENVIRONMENT_RESOURCE_GROUP_NAME }}
          runner_name: ${{ needs.create_runner.outputs.runner_name }}
          pat_token: ${{ secrets.BOT_TOKEN_GITHUB }}
